<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' href='styles/globals.css' />
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/hero.css">
  <link rel="stylesheet" href="fonts/fonts.css">
  <title>КУПИДОМ</title>
</head>

<body>
  <header class='header'>
    <div class="header__container container-2xl">
      <div class="header__logo">
        <img src='./img/svg/logo.svg' alt='логотип' width='198' height='52' />
      </div>
      <nav class='header__nav'>
        <ul class='header__list'>
          <li class='header__list-item'><a class='header__list-link' href="">Главная</a></li>
          <li class='header__list-item'><a class='header__list-link' href="">Каталог</a></li>
          <li class='header__list-item'><a class='header__list-link' href="">О нас</a></li>
          <li class='header__list-item'><a class='header__list-link' href="">Контакты</a></li>
          <li class='header__list-item'><a class='header__list-link' href="">Документация</a></li>
        </ul>
      </nav>
      <div class="header__buttons-list">
        <button class='button header__call-button header-button'>Заказать звонок</button>
        <div class="header__actions-list">
          <button class='button header-button button-icon'>
            <img width='33' height='29' src='./img/svg/bucket.svg' alt='корзина' />
          </button>
          <button class='button header-button button-icon'>
            <img src="./img/svg/car.svg" alt="грузовик">
          </button>
          <button class='button header-button button-icon'>
            <img src="./img/svg/user.svg" alt="пользователь">
          </button>
        </div>
      </div>
    </div>
  </header>
  <main class='main'>
    <section class='hero'>
      <div class="hero__content container-2xl">
        <h1 class='hero__heading'>Дома под ключ</h1>
        <p class='hero__description'>дом вашей мечты, готовый к жизни!</p>
        <button class='button hero__call-button'>Заказать звонок</button>
      </div>
    </section>
    <section>
      <div class="main__container">
        <h2 class='heading'>команда профессионалов</h2>
        
      </div>
    </section>
  </main>
  <footer>

  </footer>
</body>

</html>
